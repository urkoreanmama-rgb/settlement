<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온보딩 시퀀스 — 정착 컨시어지</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #6366f1; --brand-dark: #4f46e5; --brand-light: #eef2ff;
    --green: #10b981; --green-light: #d1fae5;
    --orange: #f59e0b; --orange-light: #fef3c7;
    --red: #ef4444; --red-light: #fee2e2;
    --surface: #fff; --surface2: #f8fafc; --border: #e2e8f0;
    --text: #0f172a; --text2: #64748b; --radius: 14px;
    --shadow: 0 1px 4px rgba(0,0,0,.07);
  }
  body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: #f0f2f5; min-height:100vh; }

  /* TOPBAR */
  .topbar {
    background: white; padding: 0 28px; height: 58px; display: flex;
    align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:50;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .back-btn {
    padding:6px 13px; border:1.5px solid var(--border); border-radius:8px;
    background:white; font-size:.8rem; cursor:pointer; color:var(--text2);
    text-decoration:none; transition:all .15s;
  }
  .back-btn:hover { border-color:var(--brand); color:var(--brand); }
  .topbar-title { font-size:1rem; font-weight:800; color:var(--text); }
  .topbar-right { display:flex; gap:10px; }
  .add-btn {
    padding:8px 18px; background:var(--brand); color:white; border:none;
    border-radius:8px; font-size:.85rem; font-weight:700; cursor:pointer; transition:background .15s;
  }
  .add-btn:hover { background:var(--brand-dark); }

  .main { padding:24px 28px; max-width:1100px; margin:0 auto; }

  /* TODAY TASKS */
  .today-section { margin-bottom:24px; }
  .section-title {
    font-size:.85rem; font-weight:800; color:var(--text2); text-transform:uppercase;
    letter-spacing:.6px; margin-bottom:10px;
  }
  .today-empty {
    background:white; border-radius:12px; padding:20px 24px;
    color:var(--text2); font-size:.9rem; box-shadow:var(--shadow);
    display:flex; align-items:center; gap:10px;
  }
  .today-grid { display:flex; flex-direction:column; gap:10px; }
  .today-card {
    background:white; border-radius:12px; padding:16px 20px;
    display:flex; align-items:center; gap:16px; box-shadow:var(--shadow);
    border-left:4px solid var(--brand);
  }
  .today-card.overdue { border-left-color: var(--red); }
  .today-icon { font-size:1.6rem; flex-shrink:0; }
  .today-info { flex:1; min-width:0; }
  .today-name { font-size:.95rem; font-weight:700; color:var(--text); }
  .today-stage { font-size:.82rem; color:var(--text2); margin-top:2px; }
  .today-sent { font-size:.75rem; color:var(--green); font-weight:600; }
  .today-actions { display:flex; gap:8px; flex-shrink:0; }
  .msg-btn {
    padding:7px 14px; background:var(--brand-light); color:var(--brand);
    border:1.5px solid #c7d2fe; border-radius:8px; font-size:.8rem;
    font-weight:600; cursor:pointer; transition:all .15s;
  }
  .msg-btn:hover { background:var(--brand); color:white; border-color:var(--brand); }
  .sent-btn {
    padding:7px 14px; background:var(--green-light); color:#047857;
    border:1.5px solid #6ee7b7; border-radius:8px; font-size:.8rem;
    font-weight:600; cursor:pointer; transition:all .15s;
  }
  .sent-btn.done { opacity:.5; cursor:default; }
  .sent-btn:not(.done):hover { background:var(--green); color:white; border-color:var(--green); }

  /* CUSTOMER LIST */
  .customers-grid { display:flex; flex-direction:column; gap:14px; }
  .cust-card {
    background:white; border-radius:14px; padding:20px 24px;
    box-shadow:var(--shadow); cursor:pointer; transition:box-shadow .15s;
  }
  .cust-card:hover { box-shadow:0 4px 16px rgba(99,102,241,.12); }
  .cust-top { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
  .cust-avatar {
    width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#6366f1,#a855f7);
    display:flex; align-items:center; justify-content:center;
    color:white; font-size:.85rem; font-weight:800; flex-shrink:0;
  }
  .cust-name { font-size:1rem; font-weight:700; color:var(--text); }
  .cust-meta { font-size:.78rem; color:var(--text2); margin-top:2px; }
  .cust-dday {
    margin-left:auto; font-size:.8rem; font-weight:700; padding:4px 12px;
    border-radius:999px; flex-shrink:0;
  }
  .cust-dday.pre  { background:var(--orange-light); color:#92400e; }
  .cust-dday.post { background:var(--brand-light); color:var(--brand); }
  .cust-dday.done { background:var(--green-light); color:#047857; }
  .cust-dday.today-badge { background:var(--red-light); color:#991b1b; }

  /* TIMELINE */
  .timeline { position:relative; padding-top:24px; }
  .timeline-track {
    position:absolute; top:12px; left:0; right:0; height:3px;
    background:var(--border); border-radius:3px;
  }
  .timeline-fill {
    height:100%; background:linear-gradient(90deg,var(--green),var(--brand));
    border-radius:3px; transition:width .4s;
  }
  .timeline-dots {
    display:flex; justify-content:space-between; position:relative;
  }
  .t-dot-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .t-dot {
    width:22px; height:22px; border-radius:50%; border:2.5px solid var(--border);
    background:white; display:flex; align-items:center; justify-content:center;
    font-size:.7rem; cursor:pointer; transition:all .15s; position:relative;
    z-index:1;
  }
  .t-dot.done  { background:var(--green); border-color:var(--green); color:white; }
  .t-dot.sent  { background:var(--brand); border-color:var(--brand); color:white; }
  .t-dot.today { background:var(--orange); border-color:var(--orange); color:white;
    box-shadow:0 0 0 4px rgba(245,158,11,.2); }
  .t-dot.future{ background:white; border-color:var(--border); color:var(--text2); }
  .t-label { font-size:.62rem; color:var(--text2); text-align:center; max-width:52px; line-height:1.3; }
  .t-label.active { color:var(--brand); font-weight:700; }
  .t-dot:hover:not(.done) { border-color:var(--brand); }

  /* EMPTY STATE */
  .empty-state {
    text-align:center; padding:60px 20px; color:var(--text2);
  }
  .empty-state .ei { font-size:3.5rem; margin-bottom:12px; }
  .empty-state p { font-size:.95rem; }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.45); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:200; padding:16px;
    display:none;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:white; border-radius:20px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,.2);
    max-height:90vh; overflow-y:auto;
  }
  .modal-header {
    padding:22px 24px 0; display:flex; align-items:center; justify-content:space-between;
  }
  .modal-title { font-size:1.05rem; font-weight:800; color:var(--text); }
  .modal-close {
    width:30px; height:30px; border:none; background:var(--surface2); border-radius:50%;
    cursor:pointer; font-size:1rem; color:var(--text2); display:flex;
    align-items:center; justify-content:center; transition:background .15s;
  }
  .modal-close:hover { background:var(--border); }
  .modal-body { padding:20px 24px 28px; }

  /* ADD CUSTOMER MODAL */
  #add-modal .modal { max-width:440px; }
  .form-group { margin-bottom:14px; }
  .form-label { font-size:.82rem; font-weight:700; color:var(--text); margin-bottom:5px; display:block; }
  .form-input, .form-select {
    width:100%; padding:10px 14px; border:1.5px solid var(--border);
    border-radius:9px; font-size:.88rem; outline:none; font-family:inherit;
    transition:border .2s; background:white; color:var(--text);
  }
  .form-input:focus, .form-select:focus { border-color:var(--brand); }
  .lang-radio { display:flex; gap:8px; flex-wrap:wrap; }
  .lang-radio label {
    padding:6px 14px; border:1.5px solid var(--border); border-radius:999px;
    font-size:.8rem; font-weight:600; cursor:pointer; color:var(--text2); transition:all .15s;
  }
  .lang-radio input { display:none; }
  .lang-radio input:checked + span { background:var(--brand); border-color:var(--brand); color:white; }
  .lang-opt {
    padding:6px 14px; border:1.5px solid var(--border); border-radius:999px;
    font-size:.8rem; font-weight:600; cursor:pointer; color:var(--text2); transition:all .15s;
    background:white;
  }
  .lang-opt.active { background:var(--brand); border-color:var(--brand); color:white; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
  .btn-cancel {
    padding:9px 20px; background:var(--surface2); border:none; border-radius:9px;
    font-size:.88rem; cursor:pointer; color:var(--text2);
  }
  .btn-primary {
    padding:9px 22px; background:var(--brand); border:none; border-radius:9px;
    font-size:.88rem; font-weight:700; cursor:pointer; color:white;
  }
  .btn-primary:hover { background:var(--brand-dark); }

  /* MESSAGE MODAL */
  #msg-modal .modal { max-width:520px; }
  .msg-stage-header {
    background:var(--brand-light); border-radius:10px; padding:14px 16px;
    margin-bottom:16px; display:flex; align-items:center; gap:10px;
  }
  .msg-stage-icon { font-size:1.4rem; }
  .msg-stage-label { font-size:.88rem; font-weight:700; color:var(--brand); }
  .msg-platform { display:flex; gap:8px; margin-bottom:12px; }
  .platform-btn {
    padding:5px 12px; border:1.5px solid var(--border); border-radius:7px;
    font-size:.78rem; font-weight:600; cursor:pointer; background:white;
    color:var(--text2); transition:all .15s;
  }
  .platform-btn.active { background:var(--brand); border-color:var(--brand); color:white; }
  .msg-text-wrap {
    background:var(--surface2); border-radius:10px; padding:14px 16px;
    font-size:.86rem; line-height:1.75; color:var(--text); white-space:pre-wrap;
    min-height:120px; max-height:240px; overflow-y:auto; border:1.5px solid var(--border);
    margin-bottom:12px; position:relative;
  }
  .copy-strip { display:flex; gap:8px; align-items:center; }
  .copy-btn {
    padding:9px 20px; background:var(--brand); color:white; border:none;
    border-radius:9px; font-size:.85rem; font-weight:700; cursor:pointer;
    flex:1; transition:background .15s;
  }
  .copy-btn:hover { background:var(--brand-dark); }
  .kakao-btn {
    padding:9px 16px; background:#FEE500; color:#3A1D1D; border:none;
    border-radius:9px; font-size:.82rem; font-weight:700; cursor:pointer;
    transition:opacity .15s;
  }
  .kakao-btn:hover { opacity:.85; }
  .msg-lang-tabs { display:flex; gap:6px; margin-bottom:10px; }
  .msg-lang-tab {
    padding:4px 11px; border:1.5px solid var(--border); border-radius:999px;
    font-size:.74rem; font-weight:600; cursor:pointer; background:white;
    color:var(--text2); transition:all .15s;
  }
  .msg-lang-tab.active { background:var(--brand); border-color:var(--brand); color:white; }
  .copy-feedback {
    font-size:.78rem; color:var(--green); font-weight:600; display:none;
  }
  .copy-feedback.show { display:inline; }

  @media(max-width:600px){
    .main { padding:14px 12px; }
    .topbar { padding:0 14px; }
    .t-label { display:none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="admin.html">← 대시보드</a>
    <span class="topbar-title">📬 온보딩 시퀀스</span>
  </div>
  <div class="topbar-right">
    <button class="add-btn" onclick="openAddModal()">+ 고객 추가</button>
  </div>
</div>

<div class="main">
  <!-- TODAY -->
  <div class="today-section">
    <div class="section-title">📋 오늘 보낼 메시지</div>
    <div id="today-container"></div>
  </div>

  <!-- ALL CUSTOMERS -->
  <div class="section-title">👥 전체 고객 (<span id="cust-count">0</span>명)</div>
  <div class="customers-grid" id="customers-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none;">
    <div class="ei">📭</div>
    <p>아직 등록된 고객이 없습니다.<br>상단 <b>+ 고객 추가</b> 버튼으로 시작하세요.</p>
  </div>
</div>

<!-- ADD CUSTOMER MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">고객 온보딩 등록</span>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">고객 이름</label>
        <input class="form-input" id="f-name" placeholder="예: Zhang Wei">
      </div>
      <div class="form-group">
        <label class="form-label">연락처 (카카오·WeChat·LINE·이메일)</label>
        <input class="form-input" id="f-contact" placeholder="예: @zhangwei99">
      </div>
      <div class="form-group">
        <label class="form-label">비자 종류</label>
        <input class="form-input" id="f-visa" placeholder="예: D-2, E-7, F-2">
      </div>
      <div class="form-group">
        <label class="form-label">입국일 (한국 도착 예정일)</label>
        <input class="form-input" id="f-arrival" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">소통 언어</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="f-lang-group">
          <button class="lang-opt active" data-lang="ko" onclick="selectLangOpt(this)">🇰🇷 한국어</button>
          <button class="lang-opt" data-lang="en" onclick="selectLangOpt(this)">🇺🇸 English</button>
          <button class="lang-opt" data-lang="zh" onclick="selectLangOpt(this)">🇨🇳 中文</button>
          <button class="lang-opt" data-lang="ja" onclick="selectLangOpt(this)">🇯🇵 日本語</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAddModal()">취소</button>
        <button class="btn-primary" onclick="addCustomer()">등록하기</button>
      </div>
    </div>
  </div>
</div>

<!-- MESSAGE MODAL -->
<div class="modal-overlay" id="msg-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="msg-modal-title">메시지 템플릿</span>
      <button class="modal-close" onclick="closeMsgModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="msg-stage-header">
        <span class="msg-stage-icon" id="msg-stage-icon">📦</span>
        <span class="msg-stage-label" id="msg-stage-label"></span>
      </div>
      <div class="msg-lang-tabs" id="msg-lang-tabs"></div>
      <div class="msg-text-wrap" id="msg-text-wrap"></div>
      <div class="copy-strip">
        <button class="copy-btn" onclick="copyMsg()">📋 복사하기</button>
        <button class="kakao-btn" onclick="openKakao()">💬 카카오</button>
        <span class="copy-feedback" id="copy-feedback">✅ 복사됨!</span>
      </div>
      <div style="margin-top:14px;">
        <button class="btn-primary" style="width:100%;" onclick="markSent()">✅ 전송 완료 처리</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── STAGES ────────────────────────────────────────────────────────────────
const STAGES = [
  { day:-14, key:'s1', icon:'📦', label:{ko:'D-14 준비',en:'D-14 Prep',zh:'D-14准备',ja:'D-14準備'} },
  { day:-7,  key:'s2', icon:'✈️', label:{ko:'D-7 최종확인',en:'D-7 Final',zh:'D-7确认',ja:'D-7確認'} },
  { day:0,   key:'s3', icon:'🎉', label:{ko:'입국 당일',en:'Arrival',zh:'入境当天',ja:'入国当日'} },
  { day:3,   key:'s4', icon:'🏠', label:{ko:'D+3 정착',en:'D+3 Settle',zh:'D+3定居',ja:'D+3定住'} },
  { day:7,   key:'s5', icon:'🏦', label:{ko:'D+7 은행',en:'D+7 Bank',zh:'D+7银行',ja:'D+7銀行'} },
  { day:14,  key:'s6', icon:'🏥', label:{ko:'D+14 보험',en:'D+14 Ins.',zh:'D+14保险',ja:'D+14保険'} },
  { day:30,  key:'s7', icon:'📊', label:{ko:'D+30 체크',en:'D+30 Check',zh:'D+30检查',ja:'D+30確認'} },
  { day:60,  key:'s8', icon:'🛂', label:{ko:'D+60 비자',en:'D+60 Visa',zh:'D+60签证',ja:'D+60ビザ'} },
  { day:90,  key:'s9', icon:'⭐', label:{ko:'D+90 리뷰',en:'D+90 Review',zh:'D+90评价',ja:'D+90評価'} },
];

// ── MESSAGE TEMPLATES ─────────────────────────────────────────────────────
const MSG = {
  s1: {
    ko: `안녕하세요, {name}님! 정착 컨시어지입니다 😊

📋 지금 준비하실 것들:
• 여권 유효기간 확인 (입국 후 6개월 이상 남아야 해요)

궁금한 점 있으면 언제든지 연락 주세요! 💪`,
    en: `Hello {name}! This is Korea Settlement Concierge 😊
Only 2 weeks until your arrival in Korea! Let's prepare together.

📋 Things to prepare now:
• Check passport validity (must have 6+ months remaining after arrival)

• Exchange currency (₩500,000~1,000,000 recommended)
• Plan for a Korean SIM card upon arrival

Feel free to ask us anything! 💪`,
    zh: `您好，{name}！这里是韩国定居服务 😊
距离入境还有2周！提前准备会让您的定居更顺畅。

📋 现在需要准备的事项：
• 确认护照有效期（入境后需剩余6个月以上）

有任何问题随时联系我们！💪`,
    ja: `こんにちは、{name}さん！定住コンシェルジュです 😊

  },
  s2: {
    ko: `{name}님, 입국이 딱 1주일 남았어요! ✈️
최종 점검 함께 해요.

📋 체크리스트:

도착하시면 바로 연락 주세요, 저희가 기다리고 있을게요! 🙌`,
    en: `{name}, only 1 week until your arrival in Korea! ✈️
Let's do a final check together.

📋 Final checklist:
• Reconfirm flight and accommodation bookings
• Pack visa and passport documents carefully
• Save our contact number (keep this one!)
• Plan route from Incheon Airport to your place

Contact us as soon as you land — we'll be waiting! 🙌`,
    zh: `{name}，距离入境只剩1周了！✈️
我们一起做最终确认吧。

📋 最终核查清单：
• 再次确认机票和住宿预订
• 妥善整理签证和护照文件

到达后请立即联系我们，我们在等您！🙌`,
    ja: `{name}さん、入国まであと1週間です！✈️
最終確認を一緒にしましょう。

// ── DATA ──────────────────────────────────────────────────────────────────
let customers = [];
let activeLang = 'ko';
let msgCtx = { custId: null, stageKey: null };

function load() {
  try { customers = JSON.parse(localStorage.getItem('concierge_onboarding') || '[]'); }
  catch { customers = []; }
}
function save() {
  localStorage.setItem('concierge_onboarding', JSON.stringify(customers));
}

// ── DATE HELPERS ──────────────────────────────────────────────────────────
function daysFromArrival(arrivalDate) {
  const arrival = new Date(arrivalDate);
  arrival.setHours(0,0,0,0);
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.round((today - arrival) / 86400000);
}

function getCurrentStage(d) {
  // Find the stage that best matches current D-day
  let best = null;
  for (const s of STAGES) {
    if (d >= s.day) best = s;
    else break;
  }
  return best;
}

function getNextStage(d) {
  for (const s of STAGES) {
    if (d < s.day) return s;
  }
  return null;
}

function isDueToday(d, stage) {
  // Due if within 1 day of the stage target
  return Math.abs(d - stage.day) <= 1;
}

function progressPercent(d) {
  const max = 90, min = -14;
  return Math.min(100, Math.max(0, Math.round((d - min) / (max - min) * 100)));
}

// ── RENDER TODAY ──────────────────────────────────────────────────────────
function renderToday() {
  const container = document.getElementById('today-container');
  const tasks = [];
  for (const c of customers) {
    const d = daysFromArrival(c.arrivalDate);
    for (const s of STAGES) {
      if (isDueToday(d, s) && !(c.sentStages || []).includes(s.key)) {
        tasks.push({ cust: c, stage: s, d });
      }
    }
  }
  if (tasks.length === 0) {
    container.innerHTML = `<div class="today-empty">✅ 오늘 보낼 메시지가 없습니다. 모든 일정이 완료됐거나 예정된 메시지가 없어요.</div>`;
    return;
  }
  container.innerHTML = `<div class="today-grid">${tasks.map(t => {
    const overdue = t.d > t.stage.day + 1;
    return `<div class="today-card${overdue?' overdue':''}">
      <span class="today-icon">${t.stage.icon}</span>
      <div class="today-info">
        <div class="today-name">${esc(t.cust.name)}</div>
        <div class="today-stage">${t.stage.label[t.cust.lang||'ko']} · ${t.cust.visa||'-'} · ${getLangFlag(t.cust.lang)}</div>
      </div>
      <div class="today-actions">
        <button class="msg-btn" onclick="openMsgModal('${t.cust.id}','${t.stage.key}')">메시지 보기</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── RENDER CUSTOMERS ──────────────────────────────────────────────────────
function renderCustomers() {
  const grid = document.getElementById('customers-grid');
  const empty = document.getElementById('empty-state');
  document.getElementById('cust-count').textContent = customers.length;
  if (customers.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  // Sort by arrival date descending
  const sorted = [...customers].sort((a,b) => new Date(b.arrivalDate) - new Date(a.arrivalDate));
  grid.innerHTML = sorted.map(c => {
    const d = daysFromArrival(c.arrivalDate);
    const sent = c.sentStages || [];
    const pct = progressPercent(d);
    const dLabel = d === 0 ? '오늘 입국' : d < 0 ? `D${d}` : `D+${d}`;
    const dClass = d < 0 ? 'pre' : d <= 90 ? 'post' : 'done';
    const initials = (c.name||'?').slice(0,2).toUpperCase();
    const dots = STAGES.map(s => {
      let cls = 'future';
      if (sent.includes(s.key)) cls = 'sent';
      else if (d > s.day + 1) cls = 'done';
      else if (isDueToday(d, s)) cls = 'today';
      return `<div class="t-dot-wrap">
        <div class="t-dot ${cls}" onclick="event.stopPropagation();openMsgModal('${c.id}','${s.key}')"
          title="${s.label[c.lang||'ko']}">${cls==='sent'?'✓':cls==='done'?'·':s.icon}</div>
        <div class="t-label${cls==='today'?' active':''}">${s.label[c.lang||'ko']}</div>
      </div>`;
    }).join('');
    return `<div class="cust-card">
      <div class="cust-top">
        <div class="cust-avatar">${initials}</div>
        <div>
          <div class="cust-name">${esc(c.name)}</div>
          <div class="cust-meta">${esc(c.contact||'-')} · ${esc(c.visa||'-')} · ${getLangFlag(c.lang)} · ${new Date(c.arrivalDate).toLocaleDateString('ko-KR')}</div>
        </div>
        <span class="cust-dday ${dClass}">${dLabel}</span>
      </div>
      <div class="timeline">
        <div class="timeline-track"><div class="timeline-fill" style="width:${pct}%"></div></div>
        <div class="timeline-dots">${dots}</div>
      </div>
    </div>`;
  }).join('');
}

// ── ADD CUSTOMER ──────────────────────────────────────────────────────────
let selectedLang = 'ko';
function selectLangOpt(el) {
  document.querySelectorAll('#f-lang-group .lang-opt').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedLang = el.dataset.lang;
}

function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('f-arrival').value = new Date().toISOString().slice(0,10);
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

function addCustomer() {
  const name    = document.getElementById('f-name').value.trim();
  const contact = document.getElementById('f-contact').value.trim();
  const visa    = document.getElementById('f-visa').value.trim();
  const arrival = document.getElementById('f-arrival').value;
  if (!name || !arrival) { alert('이름과 입국일은 필수입니다.'); return; }
  customers.push({ id: Date.now(), name, contact, visa, arrivalDate: arrival, lang: selectedLang, sentStages: [], createdAt: new Date().toISOString() });
  save(); closeAddModal(); render();
  document.getElementById('f-name').value = '';
  document.getElementById('f-contact').value = '';
  document.getElementById('f-visa').value = '';
}

// ── MESSAGE MODAL ─────────────────────────────────────────────────────────
let msgLang = 'ko';

function openMsgModal(custId, stageKey) {
  const cust = customers.find(c => String(c.id) === String(custId));
  if (!cust) return;
  const stage = STAGES.find(s => s.key === stageKey);
  if (!stage) return;
  msgCtx = { custId, stageKey };
  msgLang = cust.lang || 'ko';

  document.getElementById('msg-modal-title').textContent = `${cust.name} — ${stage.label[msgLang]}`;
  document.getElementById('msg-stage-icon').textContent = stage.icon;
  document.getElementById('msg-stage-label').textContent = stage.label[msgLang];

  // Lang tabs
  const tabs = document.getElementById('msg-lang-tabs');
  tabs.innerHTML = [['ko','🇰🇷'],['en','🇺🇸'],['zh','🇨🇳'],['ja','🇯🇵']].map(([l,f]) =>
    `<button class="msg-lang-tab${l===msgLang?' active':''}" onclick="setMsgLang('${l}',this)">${f} ${l.toUpperCase()}</button>`
  ).join('');

  renderMsgText(cust, stageKey);
  document.getElementById('msg-modal').classList.add('open');
  document.getElementById('copy-feedback').classList.remove('show');
}

function setMsgLang(l, btn) {
  msgLang = l;
  document.querySelectorAll('.msg-lang-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cust = customers.find(c => String(c.id) === String(msgCtx.custId));
  if (cust) renderMsgText(cust, msgCtx.stageKey);
}

function renderMsgText(cust, stageKey) {
  const template = (MSG[stageKey] || {})[msgLang] || '템플릿 없음';
  const text = template.replace(/\{name\}/g, cust.name).replace(/\{id\}/g, cust.id);
  document.getElementById('msg-text-wrap').textContent = text;
}

function closeMsgModal() { document.getElementById('msg-modal').classList.remove('open'); }

function copyMsg() {
  const text = document.getElementById('msg-text-wrap').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const fb = document.getElementById('copy-feedback');
    fb.classList.add('show');
    setTimeout(() => fb.classList.remove('show'), 2000);
  });
}

function openKakao() {
  const text = encodeURIComponent(document.getElementById('msg-text-wrap').textContent);
  window.open(`https://open.kakao.com/o/`, '_blank');
}

function markSent() {
  const cust = customers.find(c => String(c.id) === String(msgCtx.custId));
  if (!cust) return;
  if (!cust.sentStages) cust.sentStages = [];
  if (!cust.sentStages.includes(msgCtx.stageKey)) cust.sentStages.push(msgCtx.stageKey);
  save(); closeMsgModal(); render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getLangFlag(l) {
  return {ko:'🇰🇷',en:'🇺🇸',zh:'🇨🇳',ja:'🇯🇵'}[l] || '🌐';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() { renderToday(); renderCustomers(); }

// Close modals on overlay click
document.getElementById('add-modal').addEventListener('click', e => { if(e.target.id==='add-modal') closeAddModal(); });
document.getElementById('msg-modal').addEventListener('click', e => { if(e.target.id==='msg-modal') closeMsgModal(); });

// Init
load(); render();

// Demo: add sample customer if empty
if (customers.length === 0) {
  const today = new Date();
  const arrival7 = new Date(today); arrival7.setDate(today.getDate() + 7);
  const arrivalMinus3 = new Date(today); arrivalMinus3.setDate(today.getDate() - 3);
  customers.push({ id:1001, name:'Zhang Wei', contact:'@zhangwei', visa:'D-2', arrivalDate: arrival7.toISOString().slice(0,10), lang:'zh', sentStages:[], createdAt:new Date().toISOString() });
  customers.push({ id:1002, name:'Tanaka Yuki', contact:'@yuki_t', visa:'E-7', arrivalDate: arrivalMinus3.toISOString().slice(0,10), lang:'ja', sentStages:['s1','s2'], createdAt:new Date().toISOString() });
  save(); render();
}
</script>
